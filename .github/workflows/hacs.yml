name: HACS Action

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  hacs:
    if: "!startsWith(github.event.head_commit.message, 'Update manifest version to')"
    name: HACS Action
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"

      - name: Check hacs.json syntax
        run: |
          python -m json.tool hacs.json

      - name: HACS Action
        uses: "hacs/action@main"
        with:
          category: "integration"
