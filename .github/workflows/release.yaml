name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    if: "!startsWith(github.event.head_commit.message, 'Release v')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Extract Tag Without `v`
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/} # Remove refs/tags/
          TAG_NAME=${TAG_NAME#v}            # Remove leading v if present
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Update version
        run: |
          python3 .github/update_version.py --version $TAG_NAME

      - name: Commit version change
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add custom_components/**/manifest.json
          git fetch origin
          git checkout main && git pull
          git commit -m "Update manifest version to $TAG_NAME" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
      
      - name: Recreate tag with version
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -d v${{ env.TAG_NAME }} || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git --delete v${{ env.TAG_NAME }} || true
          git fetch origin
          git checkout main && git pull
          git tag v${{ env.TAG_NAME }} -m "Release v${{ env.TAG_NAME }}"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git v${{ env.TAG_NAME }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
